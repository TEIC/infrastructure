name: teigarage

services:
  teigarage:
    image: teic/teigarage
    container_name: teigarage
    volumes:
      - /data/Vault/Stylesheets/current/xml/tei/stylesheet:/usr/share/xml/tei/stylesheet:ro
      - /data/Vault/P5/current/xml/tei/odd:/usr/share/xml/tei/odd:ro
    environment:
      - WEBSERVICE_URL=https://teigarage.tei-c.org/ege-webservice/
      - VIRTUAL_HOST=teigarage.tei-c.org,oxgarage-humanum.tei-c.org,oxgarage.tei-c.org
      - LETSENCRYPT_HOST=teigarage.tei-c.org,oxgarage-humanum.tei-c.org,oxgarage.tei-c.org
      - VIRTUAL_PORT=8081
      - LETSENCRYPT_EMAIL=stadler@edirom.de
    restart: unless-stopped
    networks:
      - tei_net
    labels:
      autoheal: "true"

networks:
  tei_net:
    external: true
