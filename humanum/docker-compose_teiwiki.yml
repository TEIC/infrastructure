name: teiwiki

services:
  wiki:
    image: mediawiki:1.46
    container_name: teiwiki
    restart: unless-stopped
    networks:
      - tei_net
      - isolated
    volumes:
      - /data/web/wiki.tei-c.org/public_html/images:/var/www/html/images:r
      - /data/docker-secrets/teiwiki-localsettings.php:/var/www/html/LocalSettings.php:r
    environment:
      - VIRTUAL_HOST=wiki.tei-c.org,www.wiki.tei-c.org
      - LETSENCRYPT_HOST=wiki.tei-c.org,www.wiki.tei-c.org
      - VIRTUAL_PORT=80
      - LETSENCRYPT_EMAIL=stadler@edirom.de

  db:
    image: mariadb:12
    container_name: teiwikidb
    restart: unless-stopped
    volumes:
      - /data/docker-volumes/tei-wiki-sql:/var/lib/mysql:Z
      - /data/docker-volumes/tei-wiki-sqlbackup:/docker-entrypoint-initdb.d:r
    environment:
      - MYSQL_RANDOM_ROOT_PASSWORD=yes
      - MYSQL_USER_FILE=/run/secrets/db_username
      - MYSQL_DATABASE_FILE=/run/secrets/db_name
      - MYSQL_PASSWORD_FILE=/run/secrets/db_passwd
    networks:
      - isolated
    secrets:
      - source: db_passwd
      - source: db_username
      - source: db_name

networks:
  tei_net:
    external: true
  isolated:
    internal: true

secrets:
  db_passwd:
    file: /data/docker-secrets/teiwiki-db-password
  db_username:
    file: /data/docker-secrets/teiwiki-db-username
  db_name:
    file: /data/docker-secrets/teiwiki-db-name
