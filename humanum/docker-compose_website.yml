name: teiwebsite

services:
  website:
    image: teic/website:latest
    container_name: website
    volumes:
      - /data/web/tei-c.dhinstitute.ca/public_html/release:/usr/local/apache2/htdocs/release:ro
      - /data/Vault:/usr/local/apache2/htdocs/Vault:ro
      - /data/web/tei-c.dhinstitute.ca/public_html/extra/teiinlibraries:/usr/local/apache2/htdocs/SIG/Libraries/teiinlibraries:ro
    environment:
      - VIRTUAL_HOST=tei-c.org,www.tei-c.org
      - LETSENCRYPT_HOST=tei-c.org,www.tei-c.org
      - VIRTUAL_PORT=80
      - LETSENCRYPT_EMAIL=stadler@edirom.de
    restart: unless-stopped
    networks:
      - tei_net
    labels:
      autoheal: "true"

networks:
  tei_net:
    external: true
